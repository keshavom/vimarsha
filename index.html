<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#fbf6ee" />
  <title>Vimarsha · Meditation Journal</title>
  <meta name="description" content="Vimarsha — a calm daily meditation journal. Reflect on each session 0–10, watch your totals, and unwind with guided post-meditation stretches." />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="logo-mark.png" type="image/png" />
  <link rel="apple-touch-icon" href="logo-mark.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..600;1,9..144,400..500&family=Inter:wght@400;500;600;700&family=Noto+Serif+Devanagari:wght@400..600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- App shell is rendered by app.js -->
  </div>

  <nav class="tabbar" id="tabbar" hidden>
    <button class="tab" data-view="home" aria-label="Home">
      <svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8M5 9.5V20a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V9.5"/></svg>
      <span>Home</span>
    </button>
    <button class="tab" data-view="session" aria-label="New session">
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      <span>Log</span>
    </button>
    <button class="tab" data-view="stretches" aria-label="Stretches">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="2.4"/><path d="M12 8v6M7 21l5-7 5 7M6 11l6-2 6 2"/></svg>
      <span>Stretches</span>
    </button>
    <button class="tab" data-view="insights" aria-label="Insights">
      <svg viewBox="0 0 24 24"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg>
      <span>Insights</span>
    </button>
  </nav>

  <script src="config.js"></script>
  <script src="stretches.js"></script>
  <script src="app.js"></script>
  <!-- Vercel Web Analytics (anonymous visitor + page-view counts) -->
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
